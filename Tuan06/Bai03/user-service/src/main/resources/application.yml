spring:
  application:
    name: user-service
  datasource:
    url: jdbc:mariadb://localhost:3306/user_db
    username: root
    password: root
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDB103Dialect
        format_sql: true
    show-sql: false

server:
  port: 8081
  servlet:
    context-path: /

services:
  app:
    build: ./app
    container_name: my_app
    depends_on:
      - db
      - redis
    env_file:
      - .env
    networks:
      - my_network

  db:
    image: mysql:8.0
    container_name: my_db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - my_network

  redis:
    image: redis:latest
    container_name: my_redis
    networks:
      - my_network

  nginx:
    image: nginx:latest
    container_name: my_nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app
    networks:
      - my_network

volumes:
  db_data:

networks:
  my_network: